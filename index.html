<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision OS - Terminal Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #terminal-tray {
            height: 0;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.85);
        }
        #terminal-tray.open { height: 220px; border-top: 1px solid rgba(34, 211, 238, 0.3); }

        .log-entry { font-size: 10px; margin-bottom: 2px; padding: 0 15px; border-left: 2px solid transparent; }
        .log-error { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .log-warn { color: #f59e0b; }
        .log-info { color: #22d3ee; }
        .log-success { color: #22c55e; }

        .loader { width: 14px; height: 14px; border: 2px solid #06b6d4; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s; }
        .dot.active { background: #06b6d4; box-shadow: 0 0 10px #06b6d4; }
    </style>
</head>
<body>

    <div class="glass w-full max-w-2xl h-[90vh] rounded-[2.5rem] flex flex-col shadow-2xl relative overflow-hidden border-white/5">
        
        <div class="p-6 flex justify-between items-center bg-white/[0.02] border-b border-white/5">
            <div>
                <h1 class="text-[10px] font-black tracking-[0.3em] text-cyan-500 uppercase">Vision Terminal Patched</h1>
                <div class="flex items-center gap-3 mt-1">
                    <button onclick="toggleTerminal()" class="text-[9px] bg-cyan-500/10 text-cyan-400 px-2 py-0.5 rounded border border-cyan-500/30 hover:bg-cyan-500/30 transition-all font-bold uppercase">Log Console</button>
                    <span id="status-tag" class="text-[9px] text-gray-500 italic uppercase">Model: Gemini Flash</span>
                </div>
            </div>
            <button onclick="openAuth()" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-transform hover:rotate-90">⚙️</button>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-5 scroll-smooth font-sans">
            <div class="flex justify-start">
                <div class="glass p-4 rounded-2xl rounded-tl-none text-[12px] text-gray-400">Security Patch 1.6: Model IDs Corrected.</div>
            </div>
        </div>

        <div id="terminal-tray" class="overflow-hidden flex flex-col">
            <div class="flex justify-between p-2 px-4 bg-white/5 border-b border-white/5 items-center">
                <span class="text-[9px] font-bold text-cyan-500 uppercase tracking-widest">Diagnostic Feed</span>
                <button onclick="document.getElementById('terminal-content').innerHTML = ''" class="text-[9px] text-gray-500 hover:text-white">Clear</button>
            </div>
            <div id="terminal-content" class="flex-1 overflow-y-auto py-2 font-mono"></div>
        </div>

        <div class="p-6 bg-black/40 border-t border-white/5 font-sans">
            <div class="flex gap-4">
                <input id="user-input" type="text" placeholder="Enter neural command..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-cyan-500 text-sm transition-all text-white">
                <button id="send-btn" onclick="handleSend()" class="bg-white text-black font-black px-8 rounded-2xl hover:bg-cyan-400 transition-all text-xs">LINK</button>
            </div>
        </div>
    </div>

    <div id="admin-auth" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-3xl transition-all duration-500 opacity-0">
        <div class="text-center font-sans">
            <p class="text-[10px] tracking-[0.5em] text-cyan-500 mb-8 uppercase font-black">Auth Key</p>
            <div class="flex justify-center gap-4 mb-10">
                <div id="dot-0" class="dot"></div><div id="dot-1" class="dot"></div>
                <div id="dot-2" class="dot"></div><div id="dot-3" class="dot"></div>
            </div>
            <div class="grid grid-cols-3 gap-6">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<button onclick="pressKey('${i}')" class="w-14 h-14 rounded-full border border-white/10 hover:bg-cyan-500 hover:text-black transition-all font-bold text-lg">${i}</button>`);
                </script>
                <div class="w-14"></div>
                <button onclick="pressKey('0')" class="w-14 h-14 rounded-full border border-white/10 hover:bg-cyan-500 hover:text-black transition-all font-bold text-lg">0</button>
            </div>
            <button onclick="closeAuth()" class="mt-12 text-[9px] text-gray-600 uppercase tracking-widest">Abort</button>
        </div>
    </div>

    <script>
        // Updated API Key and Corrected Model ID
        const API_KEY = "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";
        const MODEL_ID = "google/gemini-2.0-flash-001"; // Switched to standard ID for better stability
        
        let enteredPin = "";
        let isBusy = false;

        function log(msg, type = 'info') {
            const tray = document.getElementById('terminal-content');
            const time = new Date().toLocaleTimeString([], { hour12: false });
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `[${time}] ${type.toUpperCase()}: ${msg}`;
            tray.appendChild(entry);
            tray.scrollTop = tray.scrollHeight;
        }

        function toggleTerminal() {
            document.getElementById('terminal-tray').classList.toggle('open');
            log("User toggled console view", "info");
        }

        // INITIAL BOOT
        log("Vision OS Bootloader v1.6...", "info");
        log("Target Model: " + MODEL_ID, "info");
        log("API Handshake: Ready", "success");

        function openAuth() {
            document.getElementById('admin-auth').classList.remove('hidden');
            setTimeout(() => document.getElementById('admin-auth').classList.add('opacity-100'), 10);
        }

        function closeAuth() {
            document.getElementById('admin-auth').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('admin-auth').classList.add('hidden'), 500);
            clearPin();
        }

        function pressKey(n) {
            if(enteredPin.length < 4) {
                document.getElementById(`dot-${enteredPin.length}`).classList.add('active');
                enteredPin += n;
                if(enteredPin.length === 4) {
                    if(enteredPin === "1234") { closeAuth(); log("Auth: Identity Verified", "success"); }
                    else { log("Auth: Invalid Signature", "error"); clearPin(); }
                }
            }
        }

        function clearPin() {
            enteredPin = "";
            for(let i=0; i<4; i++) document.getElementById(`dot-${i}`).classList.remove('active');
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-box');
            const btn = document.getElementById('send-btn');
            
            if(!input.value || isBusy) return;
            
            const msg = input.value;
            input.value = "";
            isBusy = true;
            btn.innerHTML = `<span class="loader"></span>`;
            
            chat.innerHTML += `<div class="flex justify-end"><div class="bg-cyan-500 text-black p-4 rounded-2xl rounded-tr-none text-xs font-bold shadow-lg shadow-cyan-500/20">${msg}</div></div>`;
            chat.scrollTop = chat.scrollHeight;

            log(`Sending payload to ${MODEL_ID}...`, "info");

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${API_KEY}`, 
                        "Content-Type": "application/json",
                        "X-Title": "Vision OS Terminal"
                    },
                    body: JSON.stringify({ "model": MODEL_ID, "messages": [{"role": "user", "content": msg}] })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || `HTTP ${response.status}`);
                }

                const aiText = data.choices[0].message.content;
                log(`Packet received: 200 OK`, "success");

                const aiId = "ai-" + Date.now();
                chat.innerHTML += `<div class="flex justify-start"><div id="${aiId}" class="bg-white/5 p-4 rounded-2xl rounded-tl-none border border-white/5 text-[12px] text-cyan-400"></div></div>`;
                
                let i = 0;
                function type() {
                    if(i < aiText.length) {
                        document.getElementById(aiId).innerHTML += aiText.charAt(i);
                        i++; chat.scrollTop = chat.scrollHeight;
                        setTimeout(type, 10);
                    } else {
                        isBusy = false; btn.innerText = "LINK";
                    }
                }
                type();

            } catch (err) {
                log(`FATAL: ${err.message}`, "error");
                isBusy = false;
                btn.innerText = "LINK";
                chat.innerHTML += `<div class="text-[10px] text-red-500 text-center uppercase tracking-widest py-2">Link Interrupted: Check Console</div>`;
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
